id: blinko
name: Blinko
type: skill
version: 1.0.0
description: >
  Make direct API calls to a self-hosted Blinko instance via curl.
  Supports notes (create, update, list, search, trash, delete), tags,
  file uploads, user info, config, and analytics endpoints.
author: schumannjon
tags: [blinko, notes, api, self-hosted]
files:
  - SKILL.md
  - config.json
install:
  destination: ~/.claude/skills/blinko/
  instructions: >
    Copy SKILL.md and config.json to ~/.claude/skills/blinko/.
    Edit config.json to set your Blinko instance URL.
    Set the BLINKO_API_KEY environment variable to your JWT token:
    powershell.exe -Command "[System.Environment]::SetEnvironmentVariable('BLINKO_API_KEY', 'YOUR_TOKEN_HERE', 'User')"
    The skill is then available as /blinko.
